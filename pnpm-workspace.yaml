packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

overrides:
  "@miden-sdk/miden-sdk": "0.15.6"
  "@miden-sdk/react": "0.15.6"
  "@aws-sdk/signature-v4-multi-region": "3.996.35"

# The published wallet-adapter packages import @miden-sdk/miden-sdk without
# declaring it (they rely on a hoisted install). Declare it explicitly so it
# resolves under pnpm's isolated store; the override above points it at the
# local build.
packageExtensions:
  "@miden-sdk/miden-wallet-adapter-base":
    dependencies:
      "@miden-sdk/miden-sdk": "0.15.6"
  "@miden-sdk/miden-wallet-adapter-miden":
    dependencies:
      "@miden-sdk/miden-sdk": "0.15.6"
  "@miden-sdk/miden-wallet-adapter-react":
    dependencies:
      "@miden-sdk/miden-sdk": "0.15.6"
